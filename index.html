<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Productor IA — Sancor</title>
<link href="https://fonts.googleapis.com/css2?family=DM+Serif+Display&family=DM+Sans:wght@300;400;500;600&family=DM+Mono:wght@400;500&display=swap" rel="stylesheet">
<script src="https://cdnjs.cloudflare.com/ajax/libs/xlsx/0.18.5/xlsx.full.min.js"></script>
<script src="https://cdn.jsdelivr.net/npm/chart.js@4.4.0/dist/chart.umd.min.js"></script>
<script src="https://accounts.google.com/gsi/client" async defer></script>
<style>
:root {
  --ink:#1a1a2e; --paper:#f5f0e8; --cream:#ede8dc; --gold:#c8953a;
  --gold-l:#e8b85a; --rust:#8b3a2a; --green:#2a5c45; --muted:#7a7570;
  --border:#d4cfc5; --white:#ffffff;
  --red-bg:#fee2e2; --red-fg:#991b1b;
  --yellow-bg:#fef9ec; --yellow-fg:#92400e;
  --green-bg:#d1fae5; --green-fg:#065f46;
  --blue-bg:#dbeafe; --blue-fg:#1e40af;
}
*{box-sizing:border-box;margin:0;padding:0}
body{font-family:'DM Sans',sans-serif;background:var(--paper);color:var(--ink);min-height:100vh;display:flex;flex-direction:column}
header{background:var(--ink);color:var(--paper);padding:0 28px;display:flex;align-items:center;justify-content:space-between;height:60px;position:sticky;top:0;z-index:100;box-shadow:0 2px 12px rgba(0,0,0,.2)}
.logo{display:flex;align-items:center;gap:12px}
.logo-icon{width:34px;height:34px;background:var(--gold);border-radius:8px;display:flex;align-items:center;justify-content:center;font-size:17px}
.logo-text{font-family:'DM Serif Display',serif;font-size:19px}
.logo-sub{font-size:10px;color:var(--gold-l);letter-spacing:.12em;text-transform:uppercase;margin-top:1px;font-weight:300}
.hdr-meta{font-size:11px;color:rgba(245,240,232,.45);display:flex;align-items:center;gap:16px}
.dot{width:7px;height:7px;background:#4ade80;border-radius:50%;display:inline-block;margin-right:5px;animation:pulse 2s infinite}
@keyframes pulse{0%,100%{opacity:1}50%{opacity:.4}}
.shell{display:flex;flex:1;min-height:calc(100vh - 60px)}
nav{width:210px;background:var(--ink);padding:20px 0;display:flex;flex-direction:column;gap:2px;flex-shrink:0}
.nav-sec{padding:10px 18px 4px;font-size:10px;letter-spacing:.12em;text-transform:uppercase;color:rgba(245,240,232,.3);font-weight:500;margin-top:6px}
.nav-item{display:flex;align-items:center;gap:10px;padding:10px 18px;color:rgba(245,240,232,.6);cursor:pointer;font-size:13px;transition:all .15s;border-left:3px solid transparent;user-select:none}
.nav-item:hover{background:rgba(200,149,58,.08);color:var(--gold-l)}
.nav-item.active{background:rgba(200,149,58,.12);color:var(--gold-l);border-left-color:var(--gold);font-weight:500}
.nav-item .ic{font-size:15px;width:18px;text-align:center}
.nav-badge{margin-left:auto;background:var(--rust);color:#fff;font-size:10px;padding:1px 6px;border-radius:10px;font-weight:600}
main{flex:1;display:flex;flex-direction:column;overflow:hidden}
.panel{display:none;flex-direction:column;flex:1;overflow:hidden}
.panel.active{display:flex}
.ph{background:var(--white);border-bottom:1px solid var(--border);padding:18px 28px;display:flex;align-items:center;justify-content:space-between;flex-shrink:0}
.ph-title{font-family:'DM Serif Display',serif;font-size:21px}
.ph-sub{font-size:12px;color:var(--muted);margin-top:2px}
.pb{flex:1;overflow-y:auto;padding:24px 28px}
.btn{display:inline-flex;align-items:center;gap:7px;padding:9px 20px;border-radius:8px;font-family:'DM Sans',sans-serif;font-size:13px;font-weight:500;cursor:pointer;border:none;transition:all .15s}
.btn-primary{background:var(--ink);color:var(--gold-l)}
.btn-primary:hover{background:var(--gold);color:var(--ink)}
.btn-secondary{background:var(--cream);color:var(--ink);border:1px solid var(--border)}
.btn-secondary:hover{background:var(--border)}
.btn-sm{padding:4px 10px;font-size:11px}
.btn-row{display:flex;gap:8px;margin-top:8px;flex-wrap:wrap}
.alert{background:#fef9ec;border:1px solid #f0d070;border-radius:8px;padding:11px 15px;font-size:13px;color:#7a5a10;margin-bottom:18px;display:flex;align-items:center;gap:10px}
.stats-row{display:grid;grid-template-columns:repeat(4,1fr);gap:14px;margin-bottom:22px}
.stat-card{background:var(--white);border:1px solid var(--border);border-radius:10px;padding:16px}
.stat-label{font-size:11px;text-transform:uppercase;letter-spacing:.1em;color:var(--muted);font-weight:600}
.stat-val{font-family:'DM Serif Display',serif;font-size:26px;margin-top:5px}
.stat-sub{font-size:11px;color:var(--muted);margin-top:2px}
.filters{display:flex;gap:10px;margin-bottom:16px;flex-wrap:wrap;align-items:center}
.filters input,.filters select{background:var(--white);border:1px solid var(--border);border-radius:8px;padding:8px 12px;font-family:'DM Sans',sans-serif;font-size:13px;color:var(--ink);outline:none;transition:border-color .15s}
.filters input:focus,.filters select:focus{border-color:var(--gold)}
.filters input{width:240px}
.filters select{width:140px}
.f-count{font-size:12px;color:var(--muted)}
.tbl-wrap{background:var(--white);border:1px solid var(--border);border-radius:10px;overflow:hidden;margin-bottom:20px}
table{width:100%;border-collapse:collapse;font-size:13px}
thead tr{background:var(--ink)}
th{padding:10px 14px;text-align:left;font-size:10px;letter-spacing:.08em;text-transform:uppercase;font-weight:500;color:var(--gold-l);white-space:nowrap}
td{padding:10px 14px;border-bottom:1px solid var(--cream);vertical-align:middle}
tr:last-child td{border-bottom:none}
tr.even td{background:#fff}
tr.odd td{background:var(--paper)}
tr.urgent td{background:var(--red-bg)}
tr.soon td{background:var(--yellow-bg)}
tr.renovada td{background:rgba(42,92,69,0.05);opacity:0.55;text-decoration:line-through;text-decoration-color:rgba(42,92,69,0.35)}
tr:hover td{filter:brightness(.97)}
.badge{display:inline-block;padding:2px 9px;border-radius:10px;font-size:11px;font-weight:600;white-space:nowrap}
.b-red{background:var(--red-bg);color:var(--red-fg)}
.b-yellow{background:var(--yellow-bg);color:var(--yellow-fg)}
.b-green{background:var(--green-bg);color:var(--green-fg)}
.b-blue{background:var(--blue-bg);color:var(--blue-fg)}
.b-ramo{background:#e0e7ff;color:#3730a3;font-family:'DM Mono',monospace;font-size:10px}
.output-box{background:var(--white);border:1px solid var(--border);border-radius:10px;padding:22px;margin-top:18px;font-size:13.5px;line-height:1.75;white-space:pre-wrap;display:none;position:relative}
.output-box.show{display:block}
.copy-btn{position:absolute;top:12px;right:12px;background:var(--cream);border:1px solid var(--border);border-radius:6px;padding:3px 10px;font-size:11px;cursor:pointer;font-family:'DM Sans',sans-serif;color:var(--muted);transition:all .15s}
.copy-btn:hover{background:var(--ink);color:#fff;border-color:var(--ink)}
.loader{display:none;align-items:center;gap:8px;color:var(--muted);font-size:13px;padding:12px 0}
.loader.show{display:flex}
.dots span{display:inline-block;width:6px;height:6px;background:var(--gold);border-radius:50%;animation:bounce 1.2s infinite ease-in-out;margin-right:3px}
.dots span:nth-child(2){animation-delay:.2s}
.dots span:nth-child(3){animation-delay:.4s}
@keyframes bounce{0%,80%,100%{transform:scale(.7);opacity:.5}40%{transform:scale(1);opacity:1}}
#chat-panel{background:var(--cream)}
.chat-body{flex:1;overflow-y:auto;padding:20px 28px;display:flex;flex-direction:column;gap:14px}
.msg{display:flex;gap:11px;max-width:820px;animation:fu .3s ease}
@keyframes fu{from{opacity:0;transform:translateY(7px)}to{opacity:1;transform:translateY(0)}}
.msg.ai { align-self: flex-start; }
.msg.user{flex-direction:row-reverse;align-self:flex-end}
.av{width:32px;height:32px;border-radius:50%;display:flex;align-items:center;justify-content:center;font-size:13px;flex-shrink:0;font-weight:600}
.msg.ai .av{background:var(--ink);color:var(--gold)}
.msg.user .av{background:var(--gold);color:var(--ink)}
.bubble{padding:11px 15px;border-radius:12px;font-size:14px;line-height:1.65;max-width:660px}
.msg.ai .bubble{background:var(--white);border:1px solid var(--border);border-radius:2px 12px 12px 12px;box-shadow:0 1px 4px rgba(0,0,0,.06)}
.msg.user .bubble{background:var(--ink);color:var(--paper);border-radius:12px 2px 12px 12px}
.msg-meta{font-size:10px;color:var(--muted);margin-top:3px;font-family:'DM Mono',monospace}
.msg.user .msg-meta{text-align:right}
.qa-wrap{display:flex;gap:8px;flex-wrap:wrap;padding:0 28px 14px;flex-shrink:0}
.qa{background:var(--white);border:1px solid var(--border);border-radius:20px;padding:6px 14px;font-size:12px;cursor:pointer;color:var(--ink);font-family:'DM Sans',sans-serif;transition:all .15s;white-space:nowrap}
.qa:hover{background:var(--ink);color:var(--gold-l);border-color:var(--ink)}
.chat-foot{background:var(--white);border-top:1px solid var(--border);padding:14px 28px;flex-shrink:0}
.inp-row{display:flex;gap:10px;align-items:flex-end}
.chat-inp{flex:1;background:var(--cream);border:1px solid var(--border);border-radius:10px;padding:11px 14px;font-family:'DM Sans',sans-serif;font-size:14px;color:var(--ink);resize:none;min-height:44px;max-height:130px;outline:none;transition:border-color .15s;line-height:1.5}
.chat-inp:focus{border-color:var(--gold)}
.send{width:44px;height:44px;background:var(--ink);color:var(--gold);border:none;border-radius:10px;cursor:pointer;font-size:17px;display:flex;align-items:center;justify-content:center;transition:background .15s;flex-shrink:0}
.send:hover{background:var(--gold);color:var(--ink)}
.send:disabled{opacity:.5;cursor:default}
.fg{margin-bottom:16px}
label{display:block;font-size:11px;font-weight:600;color:var(--muted);text-transform:uppercase;letter-spacing:.08em;margin-bottom:5px}
input[type=text],input[type=email],textarea,select{width:100%;background:var(--white);border:1px solid var(--border);border-radius:8px;padding:10px 13px;font-family:'DM Sans',sans-serif;font-size:14px;color:var(--ink);outline:none;transition:border-color .15s}
input:focus,textarea:focus,select:focus{border-color:var(--gold)}
textarea{resize:vertical;line-height:1.6}
.row2{display:grid;grid-template-columns:1fr 1fr;gap:14px}
.tpl-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(190px,1fr));gap:14px;margin-bottom:22px}
.tpl-card{background:var(--white);border:1px solid var(--border);border-radius:10px;padding:16px;cursor:pointer;transition:all .15s;position:relative}
.tpl-card:hover,.tpl-card.sel{border-color:var(--gold);box-shadow:0 4px 16px rgba(0,0,0,.08)}
.tpl-card.sel{background:#fffbf2}
.tpl-card .chk{position:absolute;top:10px;right:10px;width:16px;height:16px;background:var(--gold);border-radius:50%;display:none;align-items:center;justify-content:center;font-size:9px;color:#fff}
.tpl-card.sel .chk{display:flex}
.tpl-icon{font-size:24px;margin-bottom:9px}
.tpl-title{font-weight:600;font-size:13px;margin-bottom:3px}
.tpl-desc{font-size:11px;color:var(--muted);line-height:1.4}
.mail-prev{background:var(--white);border:1px solid var(--border);border-radius:10px;padding:18px;margin-top:18px;display:none}
.mail-prev.show{display:block}
.mail-prev-hdr{border-bottom:1px solid var(--border);padding-bottom:10px;margin-bottom:12px;font-size:13px}
.mail-prev-hdr span{color:var(--muted);font-size:11px;display:block}
.mail-body{font-size:13.5px;line-height:1.7;white-space:pre-wrap}
.divider{border:none;border-top:1px solid var(--border);margin:20px 0}
.section-title{font-family:'DM Serif Display',serif;font-size:16px;margin-bottom:12px}
.gmail-badge{background:#ea4335;color:#fff;font-size:10px;padding:1px 7px;border-radius:8px;font-weight:600;margin-left:6px;vertical-align:middle}
.upload-zone{display:flex;flex-direction:column;align-items:center;justify-content:center;padding:50px 28px;text-align:center;flex:1}
.uz-icon{font-size:48px;margin-bottom:16px}
.uz-title{font-family:'DM Serif Display',serif;font-size:22px;margin-bottom:9px}
.uz-sub{color:var(--muted);max-width:420px;line-height:1.65;font-size:14px;margin-bottom:24px}
.uz-label{display:inline-flex;align-items:center;gap:8px;padding:11px 24px;background:var(--ink);color:var(--gold-l);border-radius:8px;cursor:pointer;font-size:13.5px;font-weight:500;transition:all .15s}
.uz-label:hover{background:var(--gold);color:var(--ink)}
.uz-note{font-size:11px;color:var(--muted);margin-top:10px}
::-webkit-scrollbar{width:5px}
::-webkit-scrollbar-track{background:transparent}
::-webkit-scrollbar-thumb{background:var(--border);border-radius:3px}
.conn-item{background:var(--white);border:1px solid var(--border);border-radius:8px;padding:12px 16px;display:flex;align-items:center;gap:12px;margin-bottom:10px}
.agenda-card{background:#fff;border:1px solid var(--border);border-radius:10px;padding:16px 18px;margin-bottom:10px;display:flex;align-items:center;gap:16px;transition:box-shadow .15s}
.agenda-card:hover{box-shadow:0 4px 16px rgba(0,0,0,0.08)}
.agenda-rank{font-size:22px;font-weight:700;color:var(--gold);font-family:'DM Serif Display',serif;min-width:32px;text-align:center}
.agenda-rank.top3{color:var(--rust)}
.agenda-info{flex:1;min-width:0}
.agenda-nombre{font-weight:600;font-size:14px;color:var(--dark);white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
.agenda-motivo{font-size:11px;color:var(--muted);margin-top:2px}
.agenda-premio{font-size:13px;font-weight:600;color:var(--green);font-family:'DM Mono',monospace;white-space:nowrap}
.agenda-score{display:flex;flex-direction:column;align-items:center;min-width:56px}
.score-bar-wrap{width:48px;height:6px;background:#e8e0d0;border-radius:3px;overflow:hidden}
.score-bar{height:100%;border-radius:3px;background:linear-gradient(90deg,var(--gold),var(--rust))}
.score-label{font-size:10px;color:var(--muted);margin-top:3px}
.agenda-btns{display:flex;gap:6px;flex-wrap:wrap;justify-content:flex-end}
.agenda-stat{background:#fff;border:1px solid var(--border);border-radius:10px;padding:14px 18px;text-align:center}
.agenda-stat .val{font-size:22px;font-weight:700;color:var(--green);font-family:'DM Serif Display',serif}
.agenda-stat .lbl{font-size:11px;color:var(--muted);margin-top:2px}
.seg-section{background:#fff;border:1.5px solid var(--gold);border-radius:12px;padding:16px 20px;margin-bottom:20px}
.seg-section-title{font-weight:700;font-size:13px;color:var(--gold);margin-bottom:12px;display:flex;align-items:center;gap:8px}
.seg-card{display:flex;align-items:flex-start;gap:12px;padding:10px 0;border-bottom:1px solid var(--border)}
.seg-card:last-child{border-bottom:none}
.seg-dot{width:10px;height:10px;border-radius:50%;margin-top:4px;flex-shrink:0}
.seg-dot.hoy{background:var(--rust)}
.seg-dot.proximo{background:var(--gold)}
.seg-dot.vencido{background:#dc2626}
.seg-info{flex:1;min-width:0}
.seg-nombre{font-weight:600;font-size:13px}
.seg-meta{font-size:11px;color:var(--muted);margin-top:2px}
.seg-nota{font-size:12px;color:var(--ink);margin-top:3px;font-style:italic}
.seg-fecha-chip{font-size:11px;font-weight:600;padding:2px 8px;border-radius:20px;white-space:nowrap}
.seg-fecha-chip.vencido{background:var(--red-bg);color:var(--red-fg)}
.seg-fecha-chip.hoy{background:#fef3c7;color:#92400e}
.seg-fecha-chip.proximo{background:var(--green-bg);color:var(--green-fg)}
.modal-overlay{display:none;position:fixed;inset:0;background:rgba(0,0,0,.45);z-index:500;align-items:center;justify-content:center}
.modal-overlay.open{display:flex}
.modal-box{background:var(--paper);border-radius:16px;padding:28px;width:460px;max-width:95vw;box-shadow:0 20px 60px rgba(0,0,0,.25)}
.modal-title{font-family:'DM Serif Display',serif;font-size:20px;margin-bottom:4px}
.modal-sub{font-size:12px;color:var(--muted);margin-bottom:20px}
.modal-field{margin-bottom:14px}
.modal-field label{display:block;font-size:12px;font-weight:600;color:var(--muted);margin-bottom:5px;letter-spacing:.05em;text-transform:uppercase}
.modal-field input,.modal-field select,.modal-field textarea{width:100%;padding:9px 12px;border:1.5px solid var(--border);border-radius:8px;font-family:'DM Sans',sans-serif;font-size:13px;background:#fff;color:var(--ink)}
.modal-field input:focus,.modal-field select:focus,.modal-field textarea:focus{outline:none;border-color:var(--gold)}
.modal-field textarea{resize:vertical;min-height:70px}
.modal-actions{display:flex;gap:10px;justify-content:flex-end;margin-top:20px}
.modal-cliente-info{background:var(--cream);border-radius:8px;padding:10px 14px;margin-bottom:16px;font-size:13px}
.modal-cliente-info strong{color:var(--green)}

/* ── PIPELINE Y RESULTADOS ─────────────────────────────── */
.result-grid{display:grid;grid-template-columns:repeat(4,1fr);gap:10px;margin-bottom:20px}
.result-card{border-radius:10px;padding:12px 14px;text-align:center;border:1px solid}
.result-card.azul{background:var(--blue-bg);
